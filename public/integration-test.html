<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование интеграций TenderAI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .qr-code { max-width: 300px; margin: 20px 0; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input, textarea { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Тестирование интеграций TenderAI</h1>
        
        <!-- WhatsApp Section -->
        <div class="section">
            <h2>📱 WhatsApp Web</h2>
            <div id="whatsapp-section">
                <input type="text" id="wa-company-id" placeholder="Company ID" value="comp1">
                <button onclick="connectWhatsApp()">Подключить WhatsApp</button>
                <div id="wa-qr-container"></div>
                <div id="wa-status"></div>
                
                <div id="wa-send-section" style="display:none;">
                    <h3>Отправить сообщение</h3>
                    <input type="text" id="wa-recipient" placeholder="Номер получателя (+7XXXXXXXXXX)">
                    <textarea id="wa-message" placeholder="Текст сообщения"></textarea>
                    <button onclick="sendWhatsAppMessage()">Отправить</button>
                </div>
            </div>
        </div>

        <!-- Telegram Section -->
        <div class="section">
            <h2>✈️ Telegram Web</h2>
            <div id="telegram-section">
                <input type="text" id="tg-company-id" placeholder="Company ID" value="comp1">
                <button onclick="connectTelegram()">Подключить Telegram</button>
                <div id="tg-qr-container"></div>
                <div id="tg-status"></div>
                
                <div id="tg-send-section" style="display:none;">
                    <h3>Отправить сообщение</h3>
                    <input type="text" id="tg-recipient" placeholder="Username или имя контакта">
                    <textarea id="tg-message" placeholder="Текст сообщения"></textarea>
                    <button onclick="sendTelegramMessage()">Отправить</button>
                </div>
            </div>
        </div>

        <!-- Status Section -->
        <div class="section">
            <h2>📊 Статус интеграций</h2>
            <button onclick="refreshStatus()">Обновить статус</button>
            <div id="integrations-status"></div>
        </div>
    </div>

    <script>
        let currentWAIntegration = null;
        let currentTGIntegration = null;

        // WhatsApp functions
        async function connectWhatsApp() {
            const companyId = document.getElementById('wa-company-id').value;
            updateStatus('wa-status', 'Генерация QR-кода...', 'loading');
            
            try {
                const response = await fetch('/api/integrations/qr/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        companyId: companyId,
                        integrationType: 'WHATSAPP'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentWAIntegration = data.data.integrationId;
                    showQRCode('wa-qr-container', data.data.qrCode);
                    updateStatus('wa-status', 'Отсканируйте QR-код в WhatsApp', 'loading');
                    checkWAAuthStatus();
                } else {
                    updateStatus('wa-status', data.error, 'error');
                }
            } catch (error) {
                updateStatus('wa-status', 'Ошибка подключения: ' + error.message, 'error');
            }
        }

        async function checkWAAuthStatus() {
            if (!currentWAIntegration) return;
            
            try {
                const response = await fetch(`/api/integrations/qr/${currentWAIntegration}/status?type=WHATSAPP`);
                const data = await response.json();
                
                if (data.success) {
                    if (data.data.status === 'CONNECTED') {
                        updateStatus('wa-status', 'WhatsApp подключен успешно!', 'success');
                        document.getElementById('wa-send-section').style.display = 'block';
                        document.getElementById('wa-qr-container').innerHTML = '';
                    } else {
                        setTimeout(checkWAAuthStatus, 3000); // Проверяем каждые 3 секунды
                    }
                }
            } catch (error) {
                console.error('Ошибка проверки статуса:', error);
            }
        }

        // Telegram functions  
        async function connectTelegram() {
            const companyId = document.getElementById('tg-company-id').value;
            updateStatus('tg-status', 'Генерация QR-кода...', 'loading');
            
            try {
                const response = await fetch('/api/integrations/qr/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        companyId: companyId,
                        integrationType: 'TELEGRAM'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentTGIntegration = data.data.integrationId;
                    showQRCode('tg-qr-container', data.data.qrCode);
                    updateStatus('tg-status', 'Отсканируйте QR-код в Telegram', 'loading');
                    checkTGAuthStatus();
                } else {
                    updateStatus('tg-status', data.error, 'error');
                }
            } catch (error) {
                updateStatus('tg-status', 'Ошибка подключения: ' + error.message, 'error');
            }
        }

        async function checkTGAuthStatus() {
            if (!currentTGIntegration) return;
            
            try {
                const response = await fetch(`/api/integrations/qr/${currentTGIntegration}/status?type=TELEGRAM`);
                const data = await response.json();
                
                if (data.success) {
                    if (data.data.status === 'CONNECTED') {
                        updateStatus('tg-status', 'Telegram подключен успешно!', 'success');
                        document.getElementById('tg-send-section').style.display = 'block';
                        document.getElementById('tg-qr-container').innerHTML = '';
                    } else {
                        setTimeout(checkTGAuthStatus, 3000);
                    }
                }
            } catch (error) {
                console.error('Ошибка проверки статуса:', error);
            }
        }

        // Message sending
        async function sendWhatsAppMessage() {
            if (!currentWAIntegration) return;
            
            const recipient = document.getElementById('wa-recipient').value;
            const message = document.getElementById('wa-message').value;
            
            try {
                const response = await fetch('/api/integrations/message/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        integrationId: currentWAIntegration,
                        integrationType: 'WHATSAPP',
                        recipient: recipient,
                        message: message
                    })
                });
                
                const data = await response.json();
                updateStatus('wa-status', 
                    data.success ? 'Сообщение отправлено!' : 'Ошибка: ' + data.error, 
                    data.success ? 'success' : 'error'
                );
            } catch (error) {
                updateStatus('wa-status', 'Ошибка отправки: ' + error.message, 'error');
            }
        }

        async function sendTelegramMessage() {
            if (!currentTGIntegration) return;
            
            const recipient = document.getElementById('tg-recipient').value;
            const message = document.getElementById('tg-message').value;
            
            try {
                const response = await fetch('/api/integrations/message/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        integrationId: currentTGIntegration,
                        integrationType: 'TELEGRAM',
                        recipient: recipient,
                        message: message
                    })
                });
                
                const data = await response.json();
                updateStatus('tg-status',
                    data.success ? 'Сообщение отправлено!' : 'Ошибка: ' + data.error,
                    data.success ? 'success' : 'error'
                );
            } catch (error) {
                updateStatus('tg-status', 'Ошибка отправки: ' + error.message, 'error');
            }
        }

        // Utility functions
        function showQRCode(containerId, qrCodeData) {
            document.getElementById(containerId).innerHTML = 
                `<img src="${qrCodeData}" class="qr-code" alt="QR Code">`;
        }

        function updateStatus(elementId, message, type) {
            document.getElementById(elementId).innerHTML = 
                `<div class="status ${type}">${message}</div>`;
        }

        async function refreshStatus() {
            // This would call the API to get all company integrations
            updateStatus('integrations-status', 'Функция в разработке', 'loading');
        }
    </script>
</body>
</html>
